<div class="screen" id="s-login">
  <div class="topbar">
    <div class="brand" data-i18n="app.name">Clarity<em>Finance</em></div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="CF.toggleTheme()">
        <span class="theme-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
      </button>
      <button class="txt-btn lang-toggle" onclick="CF.toggleLang()">EN</button>
    </div>
  </div>
  <div class="page">
    <div style="text-align:center; padding:44px 0 28px;" class="anim-1">
      <div class="login-mark">
        <svg viewBox="0 0 34 34" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4,22 12,13 19,18 30,7"/>
          <polyline points="23,7 30,7 30,14"/>
        </svg>
      </div>
      <div class="t-display" data-i18n="app.tagline">وضوح مالي حقيقي</div>
      <div class="t-small" style="margin-top:8px" data-i18n="auth.subtitle">من بيانات خام إلى قرارات واضحة · أقل من 5 دقائق</div>
    </div>
    <div class="card login-card anim-2">
      <div class="t-h2" style="margin-bottom:18px" data-i18n="common.signin">تسجيل الدخول</div>
      <div class="field">
        <label data-i18n="auth.email">البريد الإلكتروني</label>
        <input type="email" id="inp-email" autocomplete="email" data-i18n="auth.emailPlaceholder" placeholder="name@company.sa"/>
      </div>
      <div class="field" style="margin-bottom:18px">
        <label data-i18n="auth.password">كلمة المرور</label>
        <input type="password" id="inp-pass" autocomplete="current-password" data-i18n="auth.passwordPlaceholder" placeholder="••••••••"/>
      </div>
      <button class="btn btn-primary btn-full" onclick="CF.show('upload')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        <span data-i18n="common.signin">دخول</span>
      </button>
      <div class="divider-or"><span data-i18n="common.or">أو</span></div>
      <button class="btn btn-ghost btn-full" onclick="CF.show('upload')">
        <span data-i18n="auth.tryWithoutAccount">تجربة بدون حساب</span>
      </button>
    </div>
    <p class="t-small anim-3" style="text-align:center;margin-top:14px" data-i18n="auth.security">بياناتك مشفرة ومحمية · لن نشاركها مع أي جهة</p>
  </div>
</div>
