<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ClarityFinance | المنصة المالية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <h2>Clarity</h2>
            <nav>
                <button onclick="App.showScreen('dashboard')">الرئيسية</button>
                <button onclick="App.showScreen('upload')">رفع البيانات</button>
            </nav>
        </aside>

        <main class="main-content">
            <div id="screen-dashboard" class="screen">
                <div class="card"><h1>لوحة التحكم</h1><p>الأرقام ستظهر هنا بعد الرفع.</p></div>
            </div>

            <div id="screen-upload" class="screen" style="display:none;">
                <div class="card">
                    <h1>ارفع ملف الـ CSV</h1>
                    <input type="file" id="fileInput">
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
