<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كلاريتي فايننس</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    .screen {
      display: none;
      width: 100%;
      max-width: 400px;
      padding: 20px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .active {
      display: block;
    }
    
    h1 {
      text-align: center;
      color: #2A6048;
      margin-bottom: 30px;
    }
    
    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      background: #2A6048;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #1e4e38;
    }
    
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <!-- شاشة تسجيل الدخول -->
  <div id="login-screen" class="screen active">
    <h1>كلاريتي فايننس</h1>
    <input type="email" placeholder="البريد الإلكتروني">
    <input type="password" placeholder="كلمة المرور">
    <button onclick="showScreen('upload-screen')">دخول</button>
    <button onclick="showScreen('upload-screen')">تجربة بدون حساب</button>
  </div>

  <!-- شاشة رفع الملف -->
  <div id="upload-screen" class="screen">
    <h1>رفع الملف المالي</h1>
    <p>Excel أو CSV</p>
    <button onclick="showScreen('dashboard-screen')">تحليل البيانات</button>
    <button onclick="showScreen('login-screen')">رجوع</button>
  </div>

  <!-- شاشة لوحة التحكم -->
  <div id="dashboard-screen" class="screen">
    <h1>لوحة التحكم</h1>
    <p>النتائج المالية</p>
    <button onclick="showScreen('login-screen')">خروج</button>
  </div>

  <script>
    function showScreen(screenId) {
      // إخفاء جميع الشاشات
      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.remove('active');
      });
      
      // إظهار الشاشة المطلوبة
      document.getElementById(screenId).classList.add('active');
    }
  </script>
</body>
</html>
