<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ClarityFinance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* تنسيقات إنقاذ سريعة لضمان الظهور */
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: #f0f2ee; color: #1a3a3a; }
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar-nav { width: 260px; background: #1a5c40; color: white; padding: 20px; flex-shrink: 0; }
        .content-wrapper { flex-grow: 1; padding: 40px; }
        .screen-view { display: none; } /* سنظهرها بالجافاسكريبت */
        .active-screen { display: block !important; }
        
        /* تصميم البطاقات */
        .upload-card-fancy { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .kpi-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .kpi-value { font-size: 24px; font-weight: bold; color: #1a5c40; margin-top: 10px; }
        
        .btn-glow { background: #d4af37; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .btn-glow:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        
        .nav-link { display: block; width: 100%; padding: 12px; background: transparent; border: none; color: white; text-align: right; cursor: pointer; font-size: 16px; border-radius: 8px; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar-nav">
            <h2>CLARITY</h2>
            <nav>
                <button onclick="App.showScreen('dashboard')" class="nav-link">📊 الرئيسية</button>
                <button onclick="App.showScreen('upload')" class="nav-link active">📤 رفع البيانات</button>
            </nav>
        </aside>

        <main class="content-wrapper">
            <div id="screen-upload" class="screen-view active-screen">
                <div class="upload-card-fancy">
                    <h2>ابدأ التحليل المالي</h2>
                    <p>ارفع ملف CSV الخاص بشركتك لرؤية الأرقام</p>
                    <input type="file" id="fileInput" hidden accept=".csv">
                    <button class="btn-glow" onclick="document.getElementById('fileInput').click()">اختيار ملف CSV</button>
                </div>
            </div>

            <div id="screen-dashboard" class="screen-view">
                <div class="kpi-grid">
                    <div class="kpi-card"><span>الإيرادات</span><div class="kpi-value" id="rev-val">0 ﷼</div></div>
                    <div class="kpi-card"><span>المصاريف</span><div class="kpi-value" id="exp-val">0 ﷼</div></div>
                    <div class="kpi-card"><span>صافي الربح</span><div class="kpi-value" id="profit-val" style="color: #d4af37;">0 ﷼</div></div>
                </div>
                <button class="btn-glow" style="margin-top: 20px;" onclick="App.showScreen('upload')">رفع ملف جديد</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
