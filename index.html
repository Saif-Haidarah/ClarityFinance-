<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>ClarityFinance</title>
  
  <!-- CSS Files -->
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/screens.css">
  
  <!-- Additional styles -->
  <style>
    .chart-legend { display:flex; gap:12px; }
    .chart-legend span { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
    .legend-dot { width:8px; height:8px; border-radius:3px; display:inline-block; }
    .health-pills { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
    .health-pill {
      padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; border:1.5px solid transparent;
    }
    .health-pill.ok   { background:rgba(93,214,138,0.15); color:#5DD68A; border-color:rgba(93,214,138,0.25); }
    .health-pill.warn { background:rgba(250,204,106,0.15); color:#FACC6A; border-color:rgba(250,204,106,0.25); }
    .val-step { display:flex; align-items:center; gap:10px; padding:8px 0; font-size:13px; color:var(--muted); opacity:0.45; transition: all 0.3s; }
    .val-step-dot { width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0; }
    .login-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
    }
    [data-theme="dark"] .login-card {
      background: rgba(20,26,22,0.85);
      border-color: rgba(255,255,255,0.06);
    }
    #proc-ring {
      stroke-dasharray: 314;
      stroke-dashoffset: 314;
      transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1);
      filter: drop-shadow(0 0 8px rgba(61,166,102,0.5));
    }
    #dd-liquidity, #dd-profitability, #dd-flags, #dd-summary { display: block; }
  </style>
</head>
