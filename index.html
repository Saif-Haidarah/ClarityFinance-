<main class="main-content">
    <section id="screen-upload" class="screen">
        <div class="upload-container">
            <div class="upload-box" id="dropzone">
                <i class="icon-upload"></i>
                <h2>ارفع ملف البيانات المالي</h2>
                <p>يدعم CSV و Excel بناءً على معايير ClarityFinance</p>
                <input type="file" id="fileInput" hidden>
                <button class="btn-primary" onclick="document.getElementById('fileInput').click()">تصفح الملفات</button>
            </div>
        </div>
    </section>

    <section id="screen-dashboard" class="screen" style="display: none;">
        <div class="dashboard-header">
            <h1>لوحة التحكم المالية</h1>
            <div class="health-score-mini">Health Score: <span>--</span></div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><h3>الإيرادات</h3><p id="total-revenue">0 ﷼</p></div>
            <div class="stat-card"><h3>المصاريف</h3><p id="total-expenses">0 ﷼</p></div>
            <div class="stat-card"><h3>صافي الربح</h3><p id="net-profit">0 ﷼</p></div>
        </div>

        <div class="charts-section">
            <canvas id="mainChart"></canvas>
        </div>
    </section>
</main>
