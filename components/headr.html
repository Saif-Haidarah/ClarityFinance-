<!-- header.html -->
<header class="topbar">
  <div class="brand" onclick="CF.show('dashboard')">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24">
        <polyline points="4,18 10,12 16,16 22,8"/>
        <polyline points="16,8 22,8 22,14"/>
      </svg>
    </div>
    <div class="brand-wordmark">
      <div class="brand-name">Clarity<em>Finance</em></div>
      <div class="brand-tagline" data-ar="وضوح مالي" data-en="Financial Clarity">وضوح مالي</div>
    </div>
  </div>
  
  <div class="topbar-actions">
    <button class="icon-btn" onclick="CF.toggleTheme()">
      <span class="theme-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </span>
    </button>
    <button class="txt-btn lang-toggle" onclick="CF.toggleLang()">EN</button>
    <button class="power-btn" onclick="CF.show('login')">
      <svg viewBox="0 0 24 24">
        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
        <line x1="12" y1="2" x2="12" y2="12"/>
      </svg>
    </button>
  </div>
</header>
